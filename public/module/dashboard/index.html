<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Dashboard | SmartGuard IPS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--card:#111;--border:#222;--border-hi:#333;
  --pri:#fff;--sec:#888;--ter:#555;
  --green:#4ade80;--red:#f87171;
  --sidebar:240px;
}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Inter',sans-serif;background:var(--bg);color:var(--pri);
  display:flex;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background-image:
    linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
  background-size:60px 60px;pointer-events:none;
}

/* ── SIDEBAR ── */
.sidebar{
  position:fixed;top:0;left:0;
  width:var(--sidebar);height:100vh;
  background:#0d0d0d;border-right:1px solid var(--border);
  display:flex;flex-direction:column;z-index:50;
  transition:transform .3s;
}
.sb-logo{
  display:flex;align-items:center;gap:.6rem;
  padding:1.4rem 1.2rem;border-bottom:1px solid var(--border);
  text-decoration:none;
}
.sb-logo-icon{
  width:30px;height:30px;border:1.5px solid var(--border-hi);
  border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.sb-logo-icon svg{width:16px;height:16px}
.sb-logo-text{font-size:.8rem;font-weight:600;color:var(--pri);letter-spacing:.03em}
.sb-logo-sub{font-size:.65rem;color:var(--ter);text-transform:uppercase;letter-spacing:.05em}

.sb-section{padding:.8rem .8rem .4rem;font-size:.65rem;font-weight:500;color:var(--ter);letter-spacing:.1em;text-transform:uppercase}
.sb-nav{flex:1;overflow-y:auto;padding:.5rem 0}
.sb-link{
  display:flex;align-items:center;gap:.75rem;
  padding:.65rem 1.2rem;font-size:.83rem;color:var(--sec);
  text-decoration:none;border-left:2px solid transparent;
  cursor:pointer;transition:background .15s,color .15s;
  background:none;border-right:none;border-top:none;border-bottom:none;
  width:100%;text-align:left;font-family:'Inter',sans-serif;
}
.sb-link svg{width:16px;height:16px;stroke:currentColor;flex-shrink:0}
.sb-link:hover{background:rgba(255,255,255,.04);color:var(--pri)}
.sb-link.active{color:var(--pri);border-left-color:var(--pri);background:rgba(255,255,255,.06)}

.sb-bottom{padding:1rem;border-top:1px solid var(--border)}
.sb-user{
  display:flex;align-items:center;gap:.7rem;
  padding:.5rem .6rem;border-radius:8px;
  cursor:pointer;transition:background .15s;
  border:1px solid transparent;
}
.sb-user:hover{background:rgba(255,255,255,.04);border-color:var(--border-hi)}
.sb-avatar{
  width:32px;height:32px;border-radius:50%;
  background:#1e1e1e;border:1px solid var(--border-hi);
  display:flex;align-items:center;justify-content:center;
  font-size:.75rem;font-weight:600;color:var(--sec);flex-shrink:0;
}
.sb-user-name{font-size:.8rem;font-weight:500;color:var(--pri)}
.sb-user-role{font-size:.68rem;color:var(--ter)}
.sb-user-chevron{margin-left:auto;color:var(--ter)}
.sb-user-chevron svg{width:13px;height:13px;stroke:currentColor}

/* ── LOGOUT MODAL ── */
.modal-backdrop{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.7);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.modal-backdrop.show{opacity:1;pointer-events:all}
.modal{
  background:#111;border:1px solid var(--border-hi);
  border-radius:14px;padding:2rem;
  width:320px;text-align:center;
  transform:translateY(12px);transition:transform .2s;
  box-shadow:0 24px 60px rgba(0,0,0,.7);
}
.modal-backdrop.show .modal{transform:translateY(0)}
.modal-icon{
  width:48px;height:48px;border-radius:50%;
  background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 1.2rem;
}
.modal-icon svg{width:22px;height:22px;stroke:var(--red)}
.modal-title{font-size:1rem;font-weight:600;margin-bottom:.4rem}
.modal-sub{font-size:.8rem;color:var(--sec);line-height:1.5;margin-bottom:.4rem}
.modal-user{
  display:inline-flex;align-items:center;gap:.5rem;
  margin:0 auto .8rem; padding:.35rem .75rem;
  background:rgba(255,255,255,.04);border:1px solid var(--border-hi);
  border-radius:999px;font-size:.75rem;color:var(--sec);
}
.modal-avatar-sm{
  width:20px;height:20px;border-radius:50%;
  background:#2a2a2a;border:1px solid var(--border-hi);
  display:inline-flex;align-items:center;justify-content:center;
  font-size:.6rem;font-weight:700;color:var(--sec);
}
.modal-divider{height:1px;background:var(--border);margin:1.2rem 0}
.modal-btns{display:flex;gap:.6rem}
.modal-btn-cancel{
  flex:1;padding:.6rem;background:transparent;
  border:1px solid var(--border-hi);border-radius:8px;
  color:var(--sec);font-family:'Inter',sans-serif;
  font-size:.83rem;cursor:pointer;transition:color .2s,border-color .2s;
}
.modal-btn-cancel:hover{color:var(--pri);border-color:#555}
.modal-btn-logout{
  flex:1;padding:.6rem;background:var(--red);border:none;
  border-radius:8px;color:#fff;font-family:'Inter',sans-serif;
  font-size:.83rem;font-weight:600;cursor:pointer;
  transition:opacity .2s,transform .15s;
}
.modal-btn-logout:hover{opacity:.85;transform:translateY(-1px)}

/* ── CONTENT FRAME AREA ── */
.main-frame-wrap{
  margin-left:var(--sidebar);
  flex:1;height:100vh;
  position:relative;z-index:1;
}
#content-frame{
  width:100%;height:100%;
  border:none;display:block;
  background:var(--bg);
}

/* mobile toggle */
.menu-btn{
  display:none;position:fixed;top:.75rem;right:1rem;z-index:60;
  background:none;border:1px solid var(--border);color:var(--sec);
  border-radius:6px;padding:.4rem;cursor:pointer;
}
.menu-btn svg{width:16px;height:16px}

/* loading shimmer overlay on iframe switch */
.frame-loading{
  position:absolute;inset:0;background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .15s;
}
.frame-loading.show{opacity:1;pointer-events:all}
.spinner{
  width:24px;height:24px;border:2px solid var(--border-hi);
  border-top-color:var(--pri);border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main-frame-wrap{margin-left:0}
  .menu-btn{display:flex;align-items:center;justify-content:center}
}
</style>
</head>
<body>

<!-- SIDEBAR (permanent shell) -->
<aside class="sidebar" id="sidebar">
  <a href="../../index.html" class="sb-logo">
    <div class="sb-logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    </div>
    <div>
      <div class="sb-logo-text">SmartGuard IPS</div>
      <div class="sb-logo-sub">SVM Intrusion Prevention</div>
    </div>
  </a>

  <nav class="sb-nav">
    <div class="sb-section">Main</div>
    <button class="sb-link active" data-src="home.html" id="nav-home" onclick="navigate(this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </button>
    <button class="sb-link" data-src="../live_monitoring/live_monitoring.html" id="nav-live" onclick="navigate(this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      Live Monitoring
    </button>
    <button class="sb-link" data-src="../upload/upload.html" id="nav-upload" onclick="navigate(this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Upload &amp; Analyze
    </button>

    <div class="sb-section">Analysis</div>
    <button class="sb-link" data-src="../evaluation/evaluation.html" id="nav-eval" onclick="navigate(this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Model Evaluation
    </button>
    <button class="sb-link" data-src="../report/report.html" id="nav-reports" onclick="navigate(this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      Reports &amp; Logs
    </button>

  </nav>

  <div class="sb-bottom">
    <div class="sb-user" id="sb-user-btn" onclick="openLogoutModal()" title="Account options">
      <div class="sb-avatar" id="sb-avatar"></div>
      <div>
        <div class="sb-user-name" id="sb-name"></div>
        <div class="sb-user-role">Network Admin</div>
      </div>
      <div class="sb-user-chevron">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </div>
  </div>
</aside>

<!-- LOGOUT MODAL -->
<div class="modal-backdrop" id="logout-modal" onclick="handleBackdropClick(event)">
  <div class="modal">
    <div class="modal-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </div>
    <div class="modal-title">Sign Out</div>
    <div class="modal-sub">You are currently signed in as</div>
    <div class="modal-user">
      <div class="modal-avatar-sm" id="modal-avatar"></div>
      <span id="modal-name"></span>
    </div>
    <div class="modal-sub" style="margin-bottom:0">Are you sure you want to sign out?</div>
    <div class="modal-divider"></div>
    <div class="modal-btns">
      <button class="modal-btn-cancel" onclick="closeLogoutModal()">Cancel</button>
      <button class="modal-btn-logout" onclick="confirmLogout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;margin-right:4px"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Yes, Sign Out
      </button>
    </div>
  </div>
</div>

<!-- MOBILE MENU TOGGLE -->
<button class="menu-btn" id="menu-btn">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
</button>

<!-- IFRAME CONTENT AREA -->
<div class="main-frame-wrap">
  <div class="frame-loading" id="frame-loading"><div class="spinner"></div></div>
  <iframe id="content-frame" src="home.html" title="Content"></iframe>
</div>

<script>
// ── User info
const _userName = (function(){
  const email = sessionStorage.getItem('auth_email') || '';
  const name = email
    ? email.split('@')[0].replace(/[._]/g,' ').replace(/\b\w/g, c => c.toUpperCase())
    : 'Admin';
  const initials = name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
  document.getElementById('sb-name').textContent = name;
  document.getElementById('sb-avatar').textContent = initials;
  document.getElementById('modal-name').textContent = name;
  document.getElementById('modal-avatar').textContent = initials;
  return name;
})();

// ── Logout modal
function openLogoutModal(){
  document.getElementById('logout-modal').classList.add('show');
}
function closeLogoutModal(){
  document.getElementById('logout-modal').classList.remove('show');
}
function handleBackdropClick(e){
  if(e.target===document.getElementById('logout-modal')) closeLogoutModal();
}
function confirmLogout(){
  sessionStorage.clear();
  window.location.href='../../index.html';
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape') closeLogoutModal();
});

// ── Navigation
function navigate(btn) {
  // Remove active from all
  document.querySelectorAll('.sb-link').forEach(el => el.classList.remove('active'));
  btn.classList.add('active');

  const src = btn.dataset.src;
  const frame = document.getElementById('content-frame');
  const loader = document.getElementById('frame-loading');

  // Show loader briefly
  loader.classList.add('show');
  frame.src = src;

  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');
}

// Hide loader once iframe loads
document.getElementById('content-frame').addEventListener('load', function() {
  document.getElementById('frame-loading').classList.remove('show');
});

// ── Mobile sidebar
document.getElementById('menu-btn').addEventListener('click', () =>
  document.getElementById('sidebar').classList.toggle('open'));
document.addEventListener('click', e => {
  const sb = document.getElementById('sidebar');
  const btn = document.getElementById('menu-btn');
  if (!sb.contains(e.target) && !btn.contains(e.target))
    sb.classList.remove('open');
});
</script>
</body>
</html>
